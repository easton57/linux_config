# general hyprlock config
general {
    lock_cmd = hyprlock
    before_sleep_cmd = systemctl suspend
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Monitor timeout
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10 & brightnessctl -d kbd_backlight -s set 0 
    on-resume = brightnessctl -r & brightnessctl -d kbd_backlight -r
}

# lock timeout
listener {
    timeout = 600                                 
    on-timeout = hyprlock
}

listener {
    timeout = 630
    on-timeout = hyprctl dispatch dpms off                           
    on-resume = hyprctl dispatch dpms on && brightnessctl -r          
}

listener {
    timeout = 1800                                
    on-timeout = systemctl suspend               
}
